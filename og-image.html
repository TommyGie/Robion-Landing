<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:'Barlow',sans-serif;
    background:#0a0a0a;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px);
    color:#fff;
    position:relative;
    display:flex;flex-direction:column;justify-content:center;
    padding:80px 90px;
  }
  .glow{position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none}
  .glow1{width:600px;height:600px;background:#F5A623;opacity:0.13;top:-220px;right:-160px}
  .glow2{width:480px;height:480px;background:#F5A623;opacity:0.07;bottom:-220px;left:-160px}
  .logo{height:54px;width:auto;margin-bottom:48px;position:relative}
  .badge{
    display:inline-block;align-self:flex-start;
    font-family:'Barlow Condensed',sans-serif;
    font-size:22px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
    color:#F5A623;padding:8px 18px;
    border:1px solid rgba(245,166,35,0.35);border-radius:6px;
    background:rgba(245,166,35,0.12);margin-bottom:34px;position:relative;
  }
  h1{
    font-family:'Barlow Condensed',sans-serif;
    font-size:88px;font-weight:900;line-height:0.95;
    letter-spacing:-1px;text-transform:uppercase;position:relative;
  }
  h1 .accent{color:#F5A623}
  p{
    font-size:30px;color:rgba(255,255,255,0.65);
    margin-top:30px;max-width:760px;line-height:1.4;position:relative;
  }
  p strong{color:#fff;font-weight:600}
  .url{
    position:absolute;bottom:60px;left:90px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:26px;font-weight:800;letter-spacing:2px;
    color:#fff;text-transform:uppercase;
  }
  .url span{color:#F5A623}
</style>
</head>
<body>
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>
  <img class="logo" src="logo-robion.png" alt="Robion">
  <span class="badge">Darmowe · bez subskrypcji</span>
  <h1>Faktury <span class="accent">KSeF</span><br>w 30 sekund.</h1>
  <p>Dla rzemieślników, JDG i małych firm.<br><strong>Bez subskrypcji. Dane na Twoim urządzeniu.</strong></p>
  <div class="url">robion<span>.pl</span></div>
</body>
</html>
